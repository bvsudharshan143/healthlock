<!DOCTYPE html>
<html lang="en">
<head>
    <select name="analysis_type">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthLock | Next-Gen Analytics</title>
    <!-- Bootstrap CSS for grid structure -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link href="{{ url_for('static', filename='styles.css') }}" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <i class="fas fa-fingerprint fs-3 me-3" style="color: var(--primary-glow)"></i>
                <span>HealthLock</span><span class="text-white ms-2 fw-light opacity-75">Analytics</span>
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container" style="margin-top: 8vh; margin-bottom: 8vh;">
        <div class="row justify-content-center">
            <div class="col-md-9 col-lg-7">
                <!-- Dashboard Card -->
                <div class="glass-card text-center p-5">
                    <div class="mb-5">
                        <div class="d-inline-block p-4 rounded-circle mb-4" style="background: rgba(0,229,255,0.05); border: 1px solid rgba(0,229,255,0.2); box-shadow: 0 0 30px rgba(0,229,255,0.1);">
                            <i class="fas fa-dna" style="font-size: 3rem; color: var(--primary-glow)"></i>
                        </div>
                        <h1 class="fw-bold text-white mb-3" style="font-size: 2.5rem; letter-spacing: -1px;">Federated Network</h1>
                        <p class="text-muted fs-5">Initiate a secure, privacy-preserving AI query across distributed clinical datasets.</p>
                    </div>
                    
                    <form id="analysisForm" action="{{ url_for('run_analysis') }}" method="POST">
                        <div class="mb-5 text-start px-md-4">
                            <label for="analysis_type" class="form-label ps-2">Select Analysis Protocol</label>
                            <select class="form-select custom-select" id="analysis_type" name="analysis_type" required>
                                <option value="" disabled selected>Select a clinical protocol...</option>
                                <option value="Drug Effectiveness">🧬 Drug Efficacy Analysis</option>
                                <option value="Patient Recovery Rate">📈 Patient Recovery Trajectory</option>
                                <option value="Side Effects Detection">⚠️ Adverse Event Detection</option>
                            </select>
                        </div>
                        
                        <div class="d-grid px-md-4">
                            <button type="submit" class="btn btn-glow py-3" id="submitBtn">
                                <i class="fas fa-satellite-dish me-2"></i> Execute Protocol
                            </button>
                        </div>
                        
                        <!-- Loading Spinner -->
                        <div id="loadingIndicator" class="mt-5 d-none">
                            <span class="loader mb-4"></span>
                            <h4 class="text-white tracking-wider mb-2" style="font-weight: 500;">Establishing Secure Connection</h4>
                            <p class="text-info small opacity-75">Generating AWS Bedrock Insights</p>
                        </div>
                    </form>
                </div>
                
                <div class="text-center mt-5 text-muted small d-flex align-items-center justify-content-center opacity-75">
                    <i class="fas fa-shield-alt me-2 text-success fs-5"></i> 
                    <span style="letter-spacing: 1px;">END-TO-END ENCRYPTED VIA AWS NITRO ENCLAVES</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('analysisForm').addEventListener('submit', function() {
            document.getElementById('submitBtn').classList.add('d-none');
            document.getElementById('loadingIndicator').classList.remove('d-none');
        });
    </script>
</body>
</html>
