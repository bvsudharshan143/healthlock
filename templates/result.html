<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocol Result - HealthLock</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link href="{{ url_for('static', filename='styles.css') }}" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <i class="fas fa-fingerprint fs-3 me-3" style="color: var(--primary-glow)"></i>
                <span>HealthLock</span><span class="text-white ms-2 fw-light opacity-75">Analytics</span>
            </a>
            <div>
                <a href="/" class="btn btn-sm text-white rounded-pill px-4" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);">
                    <i class="fas fa-times me-2"></i>Close View
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-5 mb-5">
        <div class="row mb-5">
            <div class="col-12">
                <div class="d-flex align-items-center mb-3">
                    <div class="spinner-grow spinner-grow-sm text-info me-3" role="status" style="width: 1rem; height: 1rem;">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <span class="text-info fw-bold text-uppercase tracking-wider small" style="letter-spacing: 3px;">Analysis Complete</span>
                </div>
                <h1 class="fw-bold mb-0" style="font-size: 3rem; letter-spacing: -1.5px;">Protocol Results</h1>
            </div>
        </div>

        <div class="row g-4 align-items-stretch">
            <!-- Left Column: Stats -->
            <div class="col-lg-4">
                <div class="glass-card h-100 d-flex flex-column justify-content-between p-4 p-xl-5">
                    <div>
                        <h6 class="text-uppercase fw-bold mb-5" style="letter-spacing: 2px; color: var(--primary-glow);">Query Details</h6>
                        
                        <div class="mb-5">
                            <label class="text-muted small text-uppercase d-block mb-2 fw-bold" style="letter-spacing: 1px;">Target Component</label>
                            <h3 class="text-white mb-0">{{ data.analysis }}</h3>
                        </div>
                        
                        <div class="mb-4">
                            <label class="text-muted small text-uppercase d-block mb-2 fw-bold" style="letter-spacing: 1px;">Metric Description</label>
                            <p class="text-light opacity-75 fs-5">{{ data.description }}</p>
                        </div>
                    </div>
                    
                    <div class="mt-4 pt-5 border-top" style="border-color: rgba(255,255,255,0.1) !important;">
                        <label class="text-muted small text-uppercase d-block mb-3 fw-bold" style="letter-spacing: 1px;">Delta Change Rate</label>
                        <div class="stat-value">
                            {{ "%.1f"|format(data.result * 100) }}<span class="ms-1" style="font-size: 2.5rem; color: var(--primary-glow);">%</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Column: AI & Visuals -->
            <div class="col-lg-8">
                <div class="glass-card h-100 p-4 p-xl-5">
                    <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center mb-5">
                        <div class="d-flex align-items-center mb-3 mb-md-0">
                            <div class="d-inline-flex p-3 rounded-4 me-4" style="background: linear-gradient(135deg, rgba(112,0,255,0.2), rgba(0,229,255,0.2)); border: 1px solid rgba(0,229,255,0.3);">
                                <i class="fas fa-brain text-white fs-3"></i>
                            </div>
                            <div>
                                <h3 class="mb-1 fw-bold text-white" style="letter-spacing: -0.5px;">Synthesized Insight</h3>
                                <p class="text-muted mb-0 small text-uppercase tracking-wider">AI Generation</p>
                            </div>
                        </div>
                        <span class="badge rounded-pill py-2 px-3" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15); font-weight: 500;">
                            <i class="fas fa-bolt text-warning me-2"></i> Amazon Bedrock
                        </span>
                    </div>
                    
                    <div class="insight-box mb-5">
                        <p class="fs-4 mb-0 text-white" style="line-height: 1.6; font-weight: 300;">
                            {{ insight }}
                        </p>
                    </div>
                    
                    <!-- Chart -->
                    <div class="p-4 rounded-4" style="background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05); height: 320px; position: relative;">
                        <canvas id="resultChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="mt-5 pt-4 text-center">
            <a href="/" class="btn btn-glow rounded-pill px-5 py-3 shadow-lg">
                <i class="fas fa-redo-alt me-2"></i> Execute New Protocol
            </a>
        </div>
    </div>

    <!-- Chart Configuration -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Setup Chart Defaults for dark mode
            Chart.defaults.color = '#94a3b8';
            Chart.defaults.font.family = "'Outfit', sans-serif";
            
            const ctx = document.getElementById('resultChart').getContext('2d');
            
            const resultValue = parseFloat('{{ data.result * 100 }}');
            const targetName = '{{ data.analysis }}';
            const description = '{{ data.description }}';
            
            // Create a gradient for the bar
            const gradient = ctx.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, '#00e5ff');
            gradient.addColorStop(1, '#7000ff');
            
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Baseline / Standard', targetName],
                    datasets: [{
                        label: description + ' (%)',
                        data: [0, resultValue],
                        backgroundColor: [
                            'rgba(255, 255, 255, 0.05)',
                            gradient
                        ],
                        borderColor: [
                            'rgba(255, 255, 255, 0.1)',
                            'rgba(0, 229, 255, 0.5)'
                        ],
                        borderWidth: 1,
                        borderRadius: 8,
                        barPercentage: 0.5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: {
                                color: 'rgba(255, 255, 255, 0.03)',
                                drawBorder: false
                            },
                            title: {
                                display: true,
                                text: 'Delta Change (%)',
                                font: { size: 13, weight: '500' },
                                padding: { bottom: 10 }
                            },
                            ticks: {
                                font: { size: 12 }
                            }
                        },
                        x: {
                            grid: {
                                display: false,
                                drawBorder: false
                            },
                            ticks: {
                                font: { size: 13, weight: '500' },
                                color: '#ffffff'
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            backgroundColor: 'rgba(11, 17, 32, 0.95)',
                            titleColor: '#00e5ff',
                            bodyColor: '#ffffff',
                            padding: 15,
                            borderColor: 'rgba(0, 229, 255, 0.2)',
                            borderWidth: 1,
                            cornerRadius: 12,
                            displayColors: false,
                            titleFont: { size: 14, weight: 'bold' },
                            bodyFont: { size: 14 }
                        }
                    }
                }
            });
        });
    </script>
</body>
</html>
